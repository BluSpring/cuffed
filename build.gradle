plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'fabric-loom' version '1.17-SNAPSHOT'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

fabricApi {
    configureDataGeneration {
        client = true
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    maven {
        url 'https://www.cursemaven.com'
        content {
            includeGroup "curse.maven"
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        // forRepositories(fg.repository) // Uncomment when using ForgeGradle
        filter {
            includeGroup "maven.modrinth"
        }
    }

    maven {
        name = "Fuzs Mod Resources"
        url = "https://raw.githubusercontent.com/Fuzss/modresources/main/maven/"
    }
    maven { url = "https://mvn.devos.one/snapshots" }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.layered() {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${minecraft_version}:${parchment_snapshot}@zip")
    }

    modImplementation "net.fabricmc:fabric-loader:$loader_version"
    modImplementation "net.fabricmc.fabric-api:fabric-api:$fabric_version"

    modApi("fuzs.forgeconfigapiport:forgeconfigapiport-fabric:21.1.6")

    // Require Lazr's Lib
//    implementation fg.deobf("curse.maven:lazrs-lib-${lazrslib_maven}")

    // Optional Dependencies

    modCompileOnly("maven.modrinth:better-combat:2.3.2+1.21.1-fabric") // Better Combat
//    modCompileOnly("curse.maven:epic-fight-mod-405076:7185742") // Epic Fight
//    modCompileOnly("curse.maven:parcool-482378:4944983") // Parcool
//    modCompileOnly("curse.maven:elenai-dodge-2-442962:4814313") // elenai dodge 2
    
//    modCompileOnly("curse.maven:irons-spells-n-spellbooks-855414:5377916") // Iron spell n' spellbooks
//    modCompileOnly("curse.maven:ars-nouveau-401955:5371927") // Ars Nouveau
//    modCompileOnly("curse.maven:mana-and-artifice-406360:6847805") // Mana and Artifice
//    modCompileOnly("curse.maven:knights-of-britannia-1111064:7377347") // Knights of Britannia

    modCompileOnly("maven.modrinth:tacz-refabricated:1.21.1-0.7.0-forge1.1.8-hotfix") // TacZ

//    modCompileOnly('libs/playerrevive.jar') // Player Revive

    modCompileOnly("maven.modrinth:simple-voice-chat:fabric-1.21.1-2.6.20") // Simple Voice Chat
    def portingLibModules = ["core", "gametest", "items"]

    for (def module in portingLibModules) {
        include(modImplementation("io.github.fabricators_of_create.Porting-Lib:${module}:${porting_lib_version}"))
    }
}

def resourceTargets = ['fabric.mod.json']
def replaceProperties = [
        minecraft_version: minecraft_version,
        mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
        mod_authors: mod_authors, mod_description: mod_description
]

processResources {
    inputs.properties replaceProperties
    replaceProperties.put 'project', project

    filesMatching(resourceTargets) {
        expand replaceProperties
    }
}

jar {
    archiveFileName.set(project.mod_name +"-" + project.minecraft_version + "-" + project.mod_version + ".jar")
    manifest {
        attributes([
                "Specification-Title"     : mod_id,
                "Specification-Vendor"    : mod_authors,
                "Specification-Version"   : mod_version, // We are version 1 of ourselves
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : project.jar.archiveVersion,
                "Implementation-Vendor"   : mod_authors,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs": "mixins.cuffed.json"
        ])
    }
}


jar.finalizedBy('reobfJar')

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}
